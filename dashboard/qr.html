<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Envico CareOS — Scan to Continue</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 32px;
    }
    .qr-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 28px;
    }
    .qr-wrap img {
      display: block;
      width: 220px;
      height: 220px;
    }
    .label {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .url {
      font-size: 12px;
      color: #38bdf8;
      word-break: break-all;
      background: #0f172a;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 28px;
    }
    .divider {
      border: none;
      border-top: 1px solid #334155;
      margin: 0 0 24px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .links a {
      display: block;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #94a3b8;
      text-decoration: none;
      transition: border-color 0.15s;
    }
    .links a:hover { border-color: #38bdf8; color: #38bdf8; }
    .links a span { float: right; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="card">
    <p class="logo">Envico CareOS 2026</p>
    <h1>Scan to continue on mobile</h1>

    <div class="qr-wrap">
      <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://github.com/buddy1974/envico&color=0f172a&bgcolor=ffffff"
        alt="QR code — github.com/buddy1974/envico"
      />
    </div>

    <p class="label">Points to</p>
    <div class="url">https://github.com/buddy1974/envico</div>

    <hr class="divider">

    <div class="links">
      <a href="https://github.com/buddy1974/envico" target="_blank">
        GitHub Repository <span>↗</span>
      </a>
      <a href="https://github.com/buddy1974/envico/blob/main/workflows/referral_intake.json" target="_blank">
        referral_intake.json <span>↗</span>
      </a>
      <a href="https://github.com/buddy1974/envico/blob/main/database/schema.sql" target="_blank">
        schema.sql <span>↗</span>
      </a>
    </div>
  </div>
</body>
</html>
